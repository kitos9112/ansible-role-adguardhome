---
- name: "Ensure {{ adguardhome_certbot_dir }} directory exists"
  ansible.builtin.file:
    path: "{{ adguardhome_certbot_dir }}/etc"
    state: directory
    mode: 0755

- name: Ensure Cloudflare credentials for certbot are configured
  ansible.builtin.assert:
    that:
      - >-
        (adguardhome_cf_api_token | default('') | trim | length > 0) or
        (
          adguardhome_cf_email_address | default('') | trim | length > 0 and
          adguardhome_cf_api_key | default('') | trim | length > 0
        )
    fail_msg: >-
      Configure Cloudflare credentials for ACME.
      Use `adguardhome_cf_api_token`, or both
      `adguardhome_cf_email_address` and `adguardhome_cf_api_key`.

- name: Copy Cloudflare config into etc folder
  ansible.builtin.template:
    src: cf.ini.j2
    dest: "{{ adguardhome_certbot_dir }}/etc/cf.ini"
    mode: 0700
    owner: root
    group: root

- name: Create `docker-cert-adguard.sh` SH script for obtaining and installing certs
  ansible.builtin.template:
    src: docker-cert.sh.j2
    dest: "{{ adguardhome_certbot_dir }}/docker-cert-adguard.sh"
    mode: 0700
    owner: root
    group: root

- name: Execute previously-copied SH script
  ansible.builtin.command:
    chdir: "{{ adguardhome_certbot_dir }}"
    cmd: ./docker-cert-adguard.sh certonly
  register: adguardhome_cert_check
  check_mode: false
  changed_when: >-
    ((adguardhome_cert_check.stdout | default('')) ~
    (adguardhome_cert_check.stderr | default('')))
    .find('Certificate not yet due for renewal; no action taken') == -1

- name: Ensure cron service is enabled and started
  ansible.builtin.service:
    name: "{{ 'cron' if ansible_facts['os_family'] == 'Debian' else 'crond' }}"
    state: started
    enabled: true
  when: ansible_facts["service_mgr"] == "systemd"

- name: Create a cronjob to automatically renew the cert
  ansible.builtin.cron:
    name: ACME Let's Encrypt @AdGuardHome
    special_time: daily
    user: root
    job: "{{ adguardhome_certbot_dir }}/docker-cert-adguard.sh certonly >> /var/log/cronjob-ansible_docker-cert-adguard.log 2>&1"
    cron_file: ansible_docker-cert-adguard
